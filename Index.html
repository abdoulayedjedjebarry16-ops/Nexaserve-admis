<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080A0F" />
  <title>NexaServe Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#080A0F;--s1:#0F1118;--s2:#171A24;--s3:#1E2230;
      --gold:#F5A623;--gold2:#D4891A;--goldf:rgba(245,166,35,0.12);
      --green:#22C55E;--red:#EF4444;--blue:#3B82F6;--purple:#A855F7;
      --t1:#F0F2F8;--t2:#9CA3B0;--t3:#5A6170;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --r:14px;--r2:10px;--r3:20px;
      --shadow:0 8px 32px rgba(0,0,0,0.5);
    }
    html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
    body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--t1);font-size:14px;line-height:1.5}
    h1,h2,h3,h4,h5{font-family:'Outfit',sans-serif}
    input,textarea,select{font-family:inherit;font-size:14px;outline:none;border:none;background:none;color:var(--t1)}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

    .app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
    .app-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px;min-height:0}
    .app-body.no-nav{padding-bottom:0}

    .auth-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
    .auth-logo{text-align:center;margin-bottom:32px}
    .auth-logo h1{font-size:32px;font-weight:800;color:var(--gold);letter-spacing:-0.5px}
    .auth-logo p{font-size:11px;color:var(--t3);margin-top:4px;letter-spacing:2px;text-transform:uppercase}
    .auth-logo .admin-badge{display:inline-block;background:var(--goldf);color:var(--gold);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px;margin-top:8px}
    .auth-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r3);padding:28px;width:100%;max-width:400px}
    .auth-title{font-size:20px;font-weight:700;margin-bottom:6px}
    .auth-sub{font-size:13px;color:var(--t3);margin-bottom:24px}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .input-wrap{position:relative}
    .inp{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 14px;color:var(--t1);transition:border-color .2s;font-size:14px;-webkit-appearance:none}
    .inp:focus{border-color:var(--gold)}
    .inp::placeholder{color:var(--t3)}
    .inp-icon{padding-right:42px}
    .inp-btn{position:absolute;right:0;top:0;height:100%;width:42px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:16px;background:none;border:none;cursor:pointer}

    .btn{display:flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--r2);font-weight:600;font-size:14px;transition:all .15s;padding:12px 20px;width:100%}
    .btn-gold{background:var(--gold);color:#000}
    .btn-gold:active{background:var(--gold2)}
    .btn-ghost{background:var(--s2);color:var(--t1);border:1px solid var(--border2)}
    .btn-red{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
    .btn-green{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
    .btn-blue{background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.25)}
    .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
    .btn-xs{padding:6px 10px;font-size:12px;border-radius:7px;width:auto}
    button:disabled{opacity:0.5;cursor:not-allowed}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);transition:color .2s;padding:8px 4px;background:none;border:none;cursor:pointer;font-family:inherit}
    .nav-item.active{color:var(--gold)}
    .nav-item-icon{font-size:20px}
    .nav-item-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

    .page-header{padding:16px 16px 0;position:sticky;top:0;background:var(--bg);z-index:10;padding-bottom:12px}
    .page-header-inner{display:flex;align-items:center;justify-content:space-between}
    .page-title{font-size:22px;font-weight:800;font-family:'Outfit',sans-serif}
    .page-sub{font-size:12px;color:var(--t3);margin-top:2px}

    .card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
    .card-title{font-size:13px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
    .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .stat-card{background:var(--s2);border-radius:var(--r2);padding:14px}
    .stat-val{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--t1)}
    .stat-label{font-size:11px;color:var(--t3);margin-top:3px}
    .stat-accent{color:var(--gold)}

    .chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .chip-gold{background:var(--goldf);color:var(--gold)}
    .chip-green{background:rgba(34,197,94,0.12);color:var(--green)}
    .chip-red{background:rgba(239,68,68,0.12);color:var(--red)}
    .chip-blue{background:rgba(59,130,246,0.12);color:var(--blue)}
    .chip-gray{background:var(--s2);color:var(--t3)}
    .chip-purple{background:rgba(168,85,247,0.12);color:var(--purple)}

    .list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .list-item:last-child{border-bottom:none}
    .list-item-main{flex:1;min-width:0}
    .list-item-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .list-item-sub{font-size:12px;color:var(--t3);margin-top:2px}

    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
    .sheet-overlay.open{opacity:1;pointer-events:all}
    .sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:24px 24px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:92dvh;display:flex;flex-direction:column}
    .sheet.open{transform:translateY(0)}
    .sheet-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:12px auto 0}
    .sheet-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
    .sheet-title{font-size:17px;font-weight:700;font-family:'Outfit',sans-serif}
    .sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;overscroll-behavior:contain;min-height:0}
    .sheet-footer{padding:12px 20px max(24px,env(safe-area-inset-bottom));flex-shrink:0;border-top:1px solid var(--border);display:flex;gap:8px}

    .toast-container{position:fixed;top:12px;left:12px;right:12px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;font-size:13px;font-weight:500;animation:toastIn .3s ease;box-shadow:var(--shadow)}
    .toast-success{background:#14532D;border:1px solid rgba(34,197,94,0.2);color:#86efac}
    .toast-error{background:#7F1D1D;border:1px solid rgba(239,68,68,0.2);color:#fca5a5}
    .toast-info{background:#1e3a5f;border:1px solid rgba(59,130,246,0.2);color:#93c5fd}
    @keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

    .alert{border-radius:var(--r2);padding:12px 14px;margin-bottom:12px;font-size:13px}
    .alert-warn{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);color:#fcd34d}
    .alert-info{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#93c5fd}
    .alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5}

    .divider{height:1px;background:var(--border);margin:16px 0}
    .subtabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none}
    .subtabs::-webkit-scrollbar{display:none}
    .subtab{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;background:var(--s1);color:var(--t3);border:1px solid var(--border);flex-shrink:0;transition:all .15s;cursor:pointer}
    .subtab.active{background:var(--goldf);color:var(--gold);border-color:rgba(245,166,35,0.3)}

    .empty{text-align:center;padding:48px 20px;color:var(--t3)}
    .empty-icon{font-size:48px;margin-bottom:12px}
    .empty-text{font-size:15px;font-weight:600;color:var(--t2)}

    .code-box{background:var(--goldf);border:1px solid rgba(245,166,35,0.3);border-radius:var(--r2);padding:16px;margin:12px 0}
    .code-box-label{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
    .code-box-value{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--gold);word-break:break-all;margin-bottom:10px}

    .flex-between{display:flex;align-items:center;justify-content:space-between}
    .flex{display:flex;align-items:center}
    .gap8{gap:8px}
    .gap12{gap:12px}
    .mt8{margin-top:8px}
    .mt12{margin-top:12px}
    .mt16{margin-top:16px}
    .mb8{margin-bottom:8px}
    .mb12{margin-bottom:12px}
    .mb16{margin-bottom:16px}
    .w100{width:100%}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    // ===================== SUPABASE CONFIG =====================
    const SUPA_URL  = "https://apqsldtzosodkunftixw.supabase.co";
    const ANON_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwcXNsZHR6b3NvZGt1bmZ0aXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjQzMzgsImV4cCI6MjA5MzE0MDMzOH0.NU5q6jRt7LY3FcgwANwXc_ADtp8bPjhpNAkiATcX93o";
    const LS_ADMIN_USER = "nexaserve_admin_user_v1";

    const PLANS = {
      essai:   { label:"Essai gratuit",  prix:0,      salles:999, employes:999, color:"chip-blue"   },
      starter: { label:"Starter",        prix:50000,  salles:2,   employes:5,   color:"chip-gold"   },
      pro:     { label:"Pro",            prix:100000, salles:5,   employes:15,  color:"chip-purple" },
      premium: { label:"Premium",        prix:200000, salles:999, employes:999, color:"chip-green"  },
    };

    const ROLES_TEAM = {
      superadmin: { label:"Super Admin", emoji:"👑" },
      support:    { label:"Support",     emoji:"🎧" },
      comptable:  { label:"Comptable",   emoji:"📊" },
      manager:    { label:"Manager",     emoji:"🏆" },
    };

    const ROLE_PERMS = {
      superadmin: { viewRestaurants:true, editRestaurants:true, assistance:true, finances:true, deleteRestaurants:true, manageTeam:true, editTarifs:true },
      manager:    { viewRestaurants:true, editRestaurants:true, assistance:true, finances:true, deleteRestaurants:false, manageTeam:false, editTarifs:false },
      support:    { viewRestaurants:true, editRestaurants:true, assistance:true, finances:false, deleteRestaurants:false, manageTeam:false, editTarifs:false },
      comptable:  { viewRestaurants:true, editRestaurants:false, assistance:false, finances:true, deleteRestaurants:false, manageTeam:false, editTarifs:false },
    };

    const fmt = (n) => new Intl.NumberFormat("fr-FR").format(Math.round(n||0)) + " GNF";
    const fmtDate = (d) => d ? new Date(d).toLocaleDateString("fr-FR") : "—";
    const fmtDateTime = (d) => d ? new Date(d).toLocaleString("fr-FR", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "—";
    const genId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
    const genPass = () => Math.random().toString(36).slice(2,8).toUpperCase() + Math.floor(Math.random()*1000);

    const db = async (table, method="GET", body=null, params={}) => {
      const url = new URL(`${SUPA_URL}/rest/v1/${table}`);
      url.searchParams.set("apikey", ANON_KEY);
      Object.entries(params).forEach(([k,v]) => { if (v !== undefined && v !== null) url.searchParams.set(k,v); });
      const opts = { method, headers:{ "apikey":ANON_KEY, "Authorization":`Bearer ${ANON_KEY}`, "Content-Type":"application/json", "Prefer":"return=representation" } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url.toString(), opts);
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || e.error || "Erreur API"); }
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    };

    const logAction = async (user, action, restaurantId, restaurantNom, details) => {
      try {
        await db("admin_logs", "POST", { team_member_id:user.id, team_member_name:`${user.prenom} ${user.nom}`, action, restaurant_id:restaurantId||null, restaurant_nom:restaurantNom||null, details:details||null });
      } catch(e) { console.warn("Log failed:", e); }
    };

    // ===================== COMPONENTS =====================
    function Toast({ toasts }) {
      return (
        <div className="toast-container">
          {toasts.map(t => (
            <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
          ))}
        </div>
      );
    }

    function Sheet({ open, onClose, title, children, footer }) {
      return (
        <>
          <div className={`sheet-overlay${open?" open":""}`} onClick={onClose} />
          <div className={`sheet${open?" open":""}`}>
            <div className="sheet-handle" />
            <div className="sheet-header">
              <span className="sheet-title">{title}</span>
              <button className="btn btn-ghost btn-xs" onClick={onClose}>✕</button>
            </div>
            <div className="sheet-body">{children}</div>
            {footer && <div className="sheet-footer">{footer}</div>}
          </div>
        </>
      );
    }

    function Confirm({ open, onClose, title, msg, onOk, danger }) {
      return (
        <Sheet open={open} onClose={onClose} title={title}
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className={`btn ${danger?"btn-red":"btn-gold"}`} onClick={()=>{onOk();onClose();}}>Confirmer</button></>}>
          <p style={{color:"var(--t2)",fontSize:14}}>{msg}</p>
        </Sheet>
      );
    }

    function FieldInp({ label, value, onChange, type="text", placeholder, required, disabled }) {
      const [show, setShow] = useState(false);
      const isPass = type === "password";
      return (
        <div className="field">
          {label && <label>{label}{required && " *"}</label>}
          <div className="input-wrap">
            <input className={`inp${isPass?" inp-icon":""}`} type={isPass && !show ? "password" : isPass ? "text" : type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled} />
            {isPass && <button className="inp-btn" type="button" onClick={()=>setShow(!show)}>{show?"🙈":"👁️"}</button>}
          </div>
        </div>
      );
    }

    function CodeBox({ label, value, onCopy }) {
      return (
        <div className="code-box">
          <div className="code-box-label">{label}</div>
          <div className="code-box-value">{value}</div>
          {onCopy && <button className="btn btn-ghost btn-sm" style={{width:"auto"}} onClick={onCopy}>📋 Copier</button>}
        </div>
      );
    }

    function PlanChip({ plan }) {
      const p = PLANS[plan] || PLANS.essai;
      return <span className={`chip ${p.color}`}>{p.label}</span>;
    }

    function StatutChip({ statut }) {
      const map = { actif:"chip-green", essai:"chip-blue", suspendu:"chip-red", expire:"chip-gray" };
      const labels = { actif:"Actif", essai:"Essai", suspendu:"Suspendu", expire:"Expiré" };
      return <span className={`chip ${map[statut]||"chip-gray"}`}>{labels[statut]||statut}</span>;
    }

    // ===================== APP =====================
    function App() {
      const [user,   setUser]   = useState(() => { try { const r=localStorage.getItem(LS_ADMIN_USER); return r?JSON.parse(r):null; } catch(e){return null;} });
      const [nav,    setNav]    = useState("dashboard");
      const [toasts, setToasts] = useState([]);

      const toast = useCallback((msg, type="info") => {
        const id = genId();
        setToasts(t => [...t, {id,msg,type}]);
        setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 3200);
      }, []);

      const login = (u) => { setUser(u); localStorage.setItem(LS_ADMIN_USER, JSON.stringify(u)); };
      const logout = () => { setUser(null); localStorage.removeItem(LS_ADMIN_USER); setNav("dashboard"); };

      const perms = user ? (ROLE_PERMS[user.role] || {}) : {};

      if (!user) return (
        <div className="app">
          <Toast toasts={toasts} />
          <div className="app-body no-nav"><LoginPage onLogin={login} toast={toast} /></div>
        </div>
      );

      const navItems = [
        { id:"dashboard", icon:"🏠", label:"Dashboard" },
        { id:"restaurants", icon:"🏪", label:"Restaurants" },
        perms.finances && { id:"finances", icon:"💰", label:"Finances" },
        perms.manageTeam && { id:"equipe", icon:"👥", label:"Équipe" },
        { id:"journal", icon:"📋", label:"Journal" },
        { id:"parametres", icon:"⚙️", label:"Paramètres" },
      ].filter(Boolean);

      return (
        <div className="app">
          <Toast toasts={toasts} />
          <div className="app-body">
            {nav==="dashboard"   && <DashboardPage user={user} toast={toast} perms={perms} />}
            {nav==="restaurants" && <RestaurantsPage user={user} toast={toast} perms={perms} />}
            {nav==="finances"    && perms.finances && <FinancesPage user={user} toast={toast} />}
            {nav==="equipe"      && perms.manageTeam && <EquipePage user={user} toast={toast} />}
            {nav==="journal"     && <JournalPage user={user} toast={toast} />}
            {nav==="parametres"  && <ParametresPage user={user} setUser={(u)=>{ setUser(u); localStorage.setItem(LS_ADMIN_USER, JSON.stringify(u)); }} toast={toast} logout={logout} />}
          </div>
          <nav className="bottom-nav">
            {navItems.map(item => (
              <button key={item.id} className={`nav-item${nav===item.id?" active":""}`} onClick={() => setNav(item.id)}>
                <span className="nav-item-icon">{item.icon}</span>
                <span className="nav-item-label">{item.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    }

    // ===================== LOGIN PAGE =====================
    function LoginPag
