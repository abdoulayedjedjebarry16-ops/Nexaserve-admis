<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080A0F" />
  <title>NexaServe Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#080A0F;--s1:#0F1118;--s2:#171A24;--s3:#1E2230;
      --gold:#F5A623;--gold2:#D4891A;--goldf:rgba(245,166,35,0.12);
      --green:#22C55E;--red:#EF4444;--blue:#3B82F6;--purple:#A855F7;
      --t1:#F0F2F8;--t2:#9CA3B0;--t3:#5A6170;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --r:14px;--r2:10px;--r3:20px;
      --shadow:0 8px 32px rgba(0,0,0,0.5);
    }
    html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
    body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--t1);font-size:14px;line-height:1.5}
    h1,h2,h3,h4,h5{font-family:'Outfit',sans-serif}
    input,textarea,select{font-family:inherit;font-size:14px;outline:none;border:none;background:none;color:var(--t1)}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

    .app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
    .app-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px;min-height:0}
    .app-body.no-nav{padding-bottom:0}

    .auth-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
    .auth-logo{text-align:center;margin-bottom:32px}
    .auth-logo h1{font-size:32px;font-weight:800;color:var(--gold);letter-spacing:-0.5px}
    .auth-logo p{font-size:11px;color:var(--t3);margin-top:4px;letter-spacing:2px;text-transform:uppercase}
    .auth-logo .admin-badge{display:inline-block;background:var(--goldf);color:var(--gold);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px;margin-top:8px}
    .auth-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r3);padding:28px;width:100%;max-width:400px}
    .auth-title{font-size:20px;font-weight:700;margin-bottom:6px}
    .auth-sub{font-size:13px;color:var(--t3);margin-bottom:24px}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .input-wrap{position:relative}
    .inp{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 14px;color:var(--t1);transition:border-color .2s;font-size:14px;-webkit-appearance:none}
    .inp:focus{border-color:var(--gold)}
    .inp::placeholder{color:var(--t3)}
    .inp-icon{padding-right:42px}
    .inp-btn{position:absolute;right:0;top:0;height:100%;width:42px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:16px;background:none;border:none;cursor:pointer}

    .btn{display:flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--r2);font-weight:600;font-size:14px;transition:all .15s;padding:12px 20px;width:100%}
    .btn-gold{background:var(--gold);color:#000}
    .btn-gold:active{background:var(--gold2)}
    .btn-ghost{background:var(--s2);color:var(--t1);border:1px solid var(--border2)}
    .btn-red{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
    .btn-green{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
    .btn-blue{background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.25)}
    .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
    .btn-xs{padding:6px 10px;font-size:12px;border-radius:7px;width:auto}
    button:disabled{opacity:0.5;cursor:not-allowed}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);transition:color .2s;padding:8px 4px;background:none;border:none;cursor:pointer;font-family:inherit}
    .nav-item.active{color:var(--gold)}
    .nav-item-icon{font-size:20px}
    .nav-item-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

    .page-header{padding:16px 16px 0;position:sticky;top:0;background:var(--bg);z-index:10;padding-bottom:12px}
    .page-header-inner{display:flex;align-items:center;justify-content:space-between}
    .page-title{font-size:22px;font-weight:800;font-family:'Outfit',sans-serif}
    .page-sub{font-size:12px;color:var(--t3);margin-top:2px}

    .card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
    .card-title{font-size:13px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
    .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .stat-card{background:var(--s2);border-radius:var(--r2);padding:14px}
    .stat-val{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--t1)}
    .stat-label{font-size:11px;color:var(--t3);margin-top:3px}
    .stat-accent{color:var(--gold)}

    .chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .chip-gold{background:var(--goldf);color:var(--gold)}
    .chip-green{background:rgba(34,197,94,0.12);color:var(--green)}
    .chip-red{background:rgba(239,68,68,0.12);color:var(--red)}
    .chip-blue{background:rgba(59,130,246,0.12);color:var(--blue)}
    .chip-gray{background:var(--s2);color:var(--t3)}
    .chip-purple{background:rgba(168,85,247,0.12);color:var(--purple)}

    .list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .list-item:last-child{border-bottom:none}
    .list-item-main{flex:1;min-width:0}
    .list-item-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .list-item-sub{font-size:12px;color:var(--t3);margin-top:2px}

    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
    .sheet-overlay.open{opacity:1;pointer-events:all}
    .sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:24px 24px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:92dvh;display:flex;flex-direction:column}
    .sheet.open{transform:translateY(0)}
    .sheet-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:12px auto 0}
    .sheet-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
    .sheet-title{font-size:17px;font-weight:700;font-family:'Outfit',sans-serif}
    .sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;overscroll-behavior:contain;min-height:0}
    .sheet-footer{padding:12px 20px max(24px,env(safe-area-inset-bottom));flex-shrink:0;border-top:1px solid var(--border);display:flex;gap:8px}

    .toast-container{position:fixed;top:12px;left:12px;right:12px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;font-size:13px;font-weight:500;animation:toastIn .3s ease;box-shadow:var(--shadow)}
    .toast-success{background:#14532D;border:1px solid rgba(34,197,94,0.2);color:#86efac}
    .toast-error{background:#7F1D1D;border:1px solid rgba(239,68,68,0.2);color:#fca5a5}
    .toast-info{background:#1e3a5f;border:1px solid rgba(59,130,246,0.2);color:#93c5fd}
    @keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

    .alert{border-radius:var(--r2);padding:12px 14px;margin-bottom:12px;font-size:13px}
    .alert-warn{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);color:#fcd34d}
    .alert-info{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#93c5fd}
    .alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5}

    .divider{height:1px;background:var(--border);margin:16px 0}
    .subtabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none}
    .subtabs::-webkit-scrollbar{display:none}
    .subtab{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;background:var(--s1);color:var(--t3);border:1px solid var(--border);flex-shrink:0;transition:all .15s;cursor:pointer}
    .subtab.active{background:var(--goldf);color:var(--gold);border-color:rgba(245,166,35,0.3)}

    .empty{text-align:center;padding:48px 20px;color:var(--t3)}
    .empty-icon{font-size:48px;margin-bottom:12px}
    .empty-text{font-size:15px;font-weight:600;color:var(--t2)}

    .code-box{background:var(--goldf);border:1px solid rgba(245,166,35,0.3);border-radius:var(--r2);padding:16px;margin:12px 0}
    .code-box-label{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
    .code-box-value{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--gold);word-break:break-all;margin-bottom:10px}

    .flex-between{display:flex;align-items:center;justify-content:space-between}
    .flex{display:flex;align-items:center}
    .gap8{gap:8px}
    .gap12{gap:12px}
    .mt8{margin-top:8px}
    .mt12{margin-top:12px}
    .mt16{margin-top:16px}
    .mb8{margin-bottom:8px}
    .mb12{margin-bottom:12px}
    .mb16{margin-bottom:16px}
    .w100{width:100%}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    // ===================== SUPABASE CONFIG =====================
    const SUPA_URL  = "https://apqsldtzosodkunftixw.supabase.co";
    const ANON_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwcXNsZHR6b3NvZGt1bmZ0aXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjQzMzgsImV4cCI6MjA5MzE0MDMzOH0.NU5q6jRt7LY3FcgwANwXc_ADtp8bPjhpNAkiATcX93o";
    const LS_ADMIN_USER = "nexaserve_admin_user_v1";

    const PLANS = {
      essai:   { label:"Essai gratuit",  prix:0,      salles:999, employes:999, color:"chip-blue"   },
      starter: { label:"Starter",        prix:50000,  salles:2,   employes:5,   color:"chip-gold"   },
      pro:     { label:"Pro",            prix:100000, salles:5,   employes:15,  color:"chip-purple" },
      premium: { label:"Premium",        prix:200000, salles:999, employes:999, color:"chip-green"  },
    };

    const ROLES_TEAM = {
      superadmin: { label:"Super Admin", emoji:"👑" },
      support:    { label:"Support",     emoji:"🎧" },
      comptable:  { label:"Comptable",   emoji:"📊" },
      manager:    { label:"Manager",     emoji:"🏆" },
    };

    const ROLE_PERMS = {
      superadmin: { viewRestaurants:true, editRestaurants:true, assistance:true, finances:true, deleteRestaurants:true, manageTeam:true, editTarifs:true },
      manager:    { viewRestaurants:true, editRestaurants:true, assistance:true, finances:true, deleteRestaurants:false, manageTeam:false, editTarifs:false },
      support:    { viewRestaurants:true, editRestaurants:true, assistance:true, finances:false, deleteRestaurants:false, manageTeam:false, editTarifs:false },
      comptable:  { viewRestaurants:true, editRestaurants:false, assistance:false, finances:true, deleteRestaurants:false, manageTeam:false, editTarifs:false },
    };

    const fmt = (n) => new Intl.NumberFormat("fr-FR").format(Math.round(n||0)) + " GNF";
    const fmtDate = (d) => d ? new Date(d).toLocaleDateString("fr-FR") : "—";
    const fmtDateTime = (d) => d ? new Date(d).toLocaleString("fr-FR", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "—";
    const genId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
    const genPass = () => Math.random().toString(36).slice(2,8).toUpperCase() + Math.floor(Math.random()*1000);

    const db = async (table, method="GET", body=null, params={}) => {
      const url = new URL(`${SUPA_URL}/rest/v1/${table}`);
      url.searchParams.set("apikey", ANON_KEY);
      Object.entries(params).forEach(([k,v]) => { if (v !== undefined && v !== null) url.searchParams.set(k,v); });
      const opts = { method, headers:{ "apikey":ANON_KEY, "Authorization":`Bearer ${ANON_KEY}`, "Content-Type":"application/json", "Prefer":"return=representation" } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url.toString(), opts);
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || e.error || "Erreur API"); }
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    };

    const logAction = async (user, action, restaurantId, restaurantNom, details) => {
      try {
        await db("admin_logs", "POST", { team_member_id:user.id, team_member_name:`${user.prenom} ${user.nom}`, action, restaurant_id:restaurantId||null, restaurant_nom:restaurantNom||null, details:details||null });
      } catch(e) { console.warn("Log failed:", e); }
    };

    // ===================== COMPONENTS =====================
    function Toast({ toasts }) {
      return (
        <div className="toast-container">
          {toasts.map(t => (
            <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
          ))}
        </div>
      );
    }

    function Sheet({ open, onClose, title, children, footer }) {
      return (
        <>
          <div className={`sheet-overlay${open?" open":""}`} onClick={onClose} />
          <div className={`sheet${open?" open":""}`}>
            <div className="sheet-handle" />
            <div className="sheet-header">
              <span className="sheet-title">{title}</span>
              <button className="btn btn-ghost btn-xs" onClick={onClose}>✕</button>
            </div>
            <div className="sheet-body">{children}</div>
            {footer && <div className="sheet-footer">{footer}</div>}
          </div>
        </>
      );
    }

    function Confirm({ open, onClose, title, msg, onOk, danger }) {
      return (
        <Sheet open={open} onClose={onClose} title={title}
          footer={<><button className="btn btn-ghost" onClick={onClose}>Annuler</button><button className={`btn ${danger?"btn-red":"btn-gold"}`} onClick={()=>{onOk();onClose();}}>Confirmer</button></>}>
          <p style={{color:"var(--t2)",fontSize:14}}>{msg}</p>
        </Sheet>
      );
    }

    function FieldInp({ label, value, onChange, type="text", placeholder, required, disabled }) {
      const [show, setShow] = useState(false);
      const isPass = type === "password";
      return (
        <div className="field">
          {label && <label>{label}{required && " *"}</label>}
          <div className="input-wrap">
            <input className={`inp${isPass?" inp-icon":""}`} type={isPass && !show ? "password" : isPass ? "text" : type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled} />
            {isPass && <button className="inp-btn" type="button" onClick={()=>setShow(!show)}>{show?"🙈":"👁️"}</button>}
          </div>
        </div>
      );
    }

    function CodeBox({ label, value, onCopy }) {
      return (
        <div className="code-box">
          <div className="code-box-label">{label}</div>
          <div className="code-box-value">{value}</div>
          {onCopy && <button className="btn btn-ghost btn-sm" style={{width:"auto"}} onClick={onCopy}>📋 Copier</button>}
        </div>
      );
    }

    function PlanChip({ plan }) {
      const p = PLANS[plan] || PLANS.essai;
      return <span className={`chip ${p.color}`}>{p.label}</span>;
    }

    function StatutChip({ statut }) {
      const map = { actif:"chip-green", essai:"chip-blue", suspendu:"chip-red", expire:"chip-gray" };
      const labels = { actif:"Actif", essai:"Essai", suspendu:"Suspendu", expire:"Expiré" };
      return <span className={`chip ${map[statut]||"chip-gray"}`}>{labels[statut]||statut}</span>;
    }

    // ===================== APP =====================
    function App() {
      const [user,   setUser]   = useState(() => { try { const r=localStorage.getItem(LS_ADMIN_USER); return r?JSON.parse(r):null; } catch(e){return null;} });
      const [nav,    setNav]    = useState("dashboard");
      const [toasts, setToasts] = useState([]);

      const toast = useCallback((msg, type="info") => {
        const id = genId();
        setToasts(t => [...t, {id,msg,type}]);
        setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 3200);
      }, []);

      const login = (u) => { setUser(u); localStorage.setItem(LS_ADMIN_USER, JSON.stringify(u)); };
      const logout = () => { setUser(null); localStorage.removeItem(LS_ADMIN_USER); setNav("dashboard"); };

      const perms = user ? (ROLE_PERMS[user.role] || {}) : {};

      if (!user) return (
        <div className="app">
          <Toast toasts={toasts} />
          <div className="app-body no-nav"><LoginPage onLogin={login} toast={toast} /></div>
        </div>
      );

      const navItems = [
        { id:"dashboard", icon:"🏠", label:"Dashboard" },
        { id:"restaurants", icon:"🏪", label:"Restaurants" },
        perms.finances && { id:"finances", icon:"💰", label:"Finances" },
        perms.manageTeam && { id:"equipe", icon:"👥", label:"Équipe" },
        { id:"journal", icon:"📋", label:"Journal" },
        { id:"parametres", icon:"⚙️", label:"Paramètres" },
      ].filter(Boolean);

      return (
        <div className="app">
          <Toast toasts={toasts} />
          <div className="app-body">
            {nav==="dashboard"   && <DashboardPage user={user} toast={toast} perms={perms} />}
            {nav==="restaurants" && <RestaurantsPage user={user} toast={toast} perms={perms} />}
            {nav==="finances"    && perms.finances && <FinancesPage user={user} toast={toast} />}
            {nav==="equipe"      && perms.manageTeam && <EquipePage user={user} toast={toast} />}
            {nav==="journal"     && <JournalPage user={user} toast={toast} />}
            {nav==="parametres"  && <ParametresPage user={user} setUser={(u)=>{ setUser(u); localStorage.setItem(LS_ADMIN_USER, JSON.stringify(u)); }} toast={toast} logout={logout} />}
          </div>
          <nav className="bottom-nav">
            {navItems.map(item => (
              <button key={item.id} className={`nav-item${nav===item.id?" active":""}`} onClick={() => setNav(item.id)}>
                <span className="nav-item-icon">{item.icon}</span>
                <span className="nav-item-label">{item.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    }

    // ===================== LOGIN PAGE =====================
    function LoginPage({ onLogin, toast }) {
      const [email, setEmail] = useState("");
      const [pass,  setPass]  = useState("");
      const [loading, setLoading] = useState(false);

      const submit = async () => {
        if (!email||!pass) { toast("Remplissez tous les champs","error"); return; }
        setLoading(true);
        try {
          const rows = await db("nexaserve_team", "GET", null, { email:`eq.${email}`, actif:"eq.true", select:"*" });
          if (!rows.length || rows[0].password_hash !== pass) { toast("Identifiants incorrects","error"); setLoading(false); return; }
          const u = rows[0];
          // Mettre à jour last_login
          await db("nexaserve_team", "PATCH", {last_login:new Date().toISOString()}, {id:`eq.${u.id}`}).catch(()=>{});
          // C1 : enregistrer la connexion dans le journal
          await db("admin_logs", "POST", { team_member_id:u.id, team_member_name:`${u.prenom} ${u.nom}`, action:"Connexion au dashboard", restaurant_id:null, restaurant_nom:null, details:`Rôle : ${u.role}` }).catch(()=>{});
          onLogin(u);
          toast(`Bienvenue ${u.prenom} !`, "success");
        } catch(e) { toast("Erreur de connexion : "+e.message, "error"); }
        setLoading(false);
      };

      return (
        <div className="auth-wrap">
          <div className="auth-logo">
            <h1>NexaServe</h1>
            <p>Gestion de restaurant</p>
            <span className="admin-badge">ADMIN DASHBOARD</span>
          </div>
          <div className="auth-card">
            <div className="auth-title">Connexion équipe</div>

    // ===================== DASHBOARD PAGE =====================
    function DashboardPage({ user, toast, perms }) {
      const [stats, setStats] = useState({ total:0, actifs:0, essais:0, revenus:0 });
      const [loading, setLoading] = useState(true);

        const load = async () => {

            const essais = restaurants.filter(r => r.statut_abo==="essai").length;

            setStats({total, actifs, essais, revenus});

      return (
        <>
          <div className="page-header">

              <div>
                <h1 className="page-title">Dashboard</h1>

                  <div className="stat-card"><div className="stat-val">{stats.total}</div><div className="stat-label">Restaurants inscrits</div></div>
                  <div className="stat-card"><div className="stat-val stat-accent">{stats.actifs}</div><div className="stat-label">Restaurants actifs</div></div>
                </div>
                <div className="stat-row">
                  <div className="stat-card"><div className="stat-val" style={{color:"var(--blue)"}}>{stats.essais}</div><div className="stat-label">En période d'essai</div></div>
                  {perms.finances && <div className="stat-card"><div className="stat-val stat-accent" style={{fontSize:15}}>{fmt(stats.revenus)}</div><div className="stat-label">Revenus mensuels estimés</div></div>}
                  {!perms.finances && <div className="stat-card"><div className="stat-val">—</div><div className="stat-label">Finances (accès limité)</div></div>}

                <div className="card">
                  <div className="card-title">Plans</div>
                  {Object.entries(PLANS).map(([k,p]) => (

                      <PlanChip plan={k} />

    // ===================== RESTAURANTS PAGE =====================
    function RestaurantsPage({ user, toast, perms }) {
      const [restaurants, setRestaurants] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filterStatut, setFilterStatut] = useState("all");
      const [filterPlan, setFilterPlan] = useState("all");
      const [search, setSearch] = useState("");
      const [selected, setSelected] = useState(null);

      const load = async () => {
        try {
          const rows = await db("restaurants","GET",null,{select:"*",order:"created_at.desc"});
          setRestaurants(rows);
        } catch(e) { toast("Erreur chargement","error"); }
        setLoading(false);
      };

      useEffect(()=>{ load(); }, []);

      const filtered = restaurants.filter(r => {
        if (filterStatut !== "all" && r.statut_abo !== filterStatut) return false;
        if (filterPlan   !== "all" && r.plan       !== filterPlan)   return false;
        if (search && !r.nom?.toLowerCase().includes(search.toLowerCase()) && !r.code?.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      const toggleSuspend = async (r) => {
        const newStatut = r.statut_abo === "suspendu" ? "actif" : "suspendu";
        await db("restaurants","PATCH",{statut_abo:newStatut},{id:`eq.${r.id}`});
        await logAction(user, newStatut==="suspendu"?"Suspension":"Réactivation", r.id, r.nom, `Statut changé en ${newStatut}`);
        toast(newStatut==="suspendu"?"Restaurant suspendu":"Restaurant réactivé", newStatut==="suspendu"?"error":"success");
        load();
      };

      if (selected) return <RestaurantFiche restaurant={selected} onBack={()=>{setSelected(null);load();}} user={user} toast={toast} perms={perms} />;

      return (
        <>
          <div className="page-header">
            <div className="page-header-inner"><h1 className="page-title">Restaurants</h1></div>
            <div style={{marginTop:8,position:"relative"}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--t3)"}}>🔍</span>
              <input className="inp" style={{paddingLeft:36}} placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
            <div className="subtabs mt8">
              {["all","actif","essai","suspendu","expire"].map(s => (
                <button key={s} className={`subtab${filterStatut===s?" active":""}`} onClick={()=>setFilterStatut(s)}>
                  {s==="all"?"Tous":s.charAt(0).toUpperCase()+s.slice(1)}
                </button>
              ))}
            </div>
            <div className="subtabs">
              {["all",...Object.keys(PLANS)].map(p => (
                <button key={p} className={`subtab${filterPlan===p?" active":""}`} onClick={()=>setFilterPlan(p)}>
                  {p==="all"?"Tous les plans":PLANS[p]?.label||p}
                </button>
              ))}
            </div>
          </div>
          <div style={{padding:"0 16px 16px"}}>
            {loading && <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}>Chargement...</div>}
            {!loading && filtered.length===0 && <div className="empty"><div className="empty-icon">🏪</div><div className="empty-text">Aucun restaurant</div></div>}
            {filtered.map(r => (
              <div key={r.id} className="card" style={{cursor:"pointer"}} onClick={()=>setSelected(r)}>
                <div className="flex-between mb8">
                  <div>
                    <div style={{fontWeight:700,fontSize:15}}>{r.nom}</div>
                    <div style={{fontSize:12,color:"var(--t3)"}}>{r.adresse} · {r.code}</div>
                  </div>
                  <StatutChip statut={r.statut_abo||"essai"} />
                </div>
                <div className="flex-between">
                  <PlanChip plan={r.plan||"essai"} />
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:11,color:"var(--t3)"}}>Exp. {fmtDate(r.date_expiration)}</span>
                    {perms.editRestaurants && (
                      <button className={`btn btn-xs ${r.statut_abo==="suspendu"?"btn-green":"btn-red"}`}
                        onClick={e=>{e.stopPropagation();toggleSuspend(r);}}>
                        {r.statut_abo==="suspendu"?"Réactiver":"Suspendre"}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </>
      );
    }

    // ===================== FICHE RESTAURANT =====================
    function RestaurantFiche({ restaurant, onBack, user, toast, perms }) {
      const [r, setR] = useState(restaurant);
      const [tab, setTab] = useState("info");
      const [employees, setEmployees] = useState([]);
      const [tables, setTables] = useState([]);
      const [orders, setOrders] = useState([]);
      const [payments, setPayments] = useState([]); // C2
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showPlan, setShowPlan] = useState(false);
      const [showProlonger, setShowProlonger] = useState(false);
      const [showAssistance, setShowAssistance] = useState(false);
      const [joursAjout, setJoursAjout] = useState("30");
      const [newPlan, setNewPlan] = useState(r.plan||"essai");

      useEffect(()=>{
        const load = async () => {
          try {
            const [emps, tbls, ords, pmts, lgss] = await Promise.all([
              db("employees","GET",null,{restaurant_id:`eq.${r.id}`,select:"*"}),
              db("tables","GET",null,{restaurant_id:`eq.${r.id}`,select:"*"}),
              db("orders","GET",null,{restaurant_id:`eq.${r.id}`,order:"created_at.desc",limit:"50",select:"*"}),
              db("payments","GET",null,{restaurant_id:`eq.${r.id}`,order:"created_at.desc",limit:"50",select:"*"}), // C2
              db("admin_logs","GET",null,{restaurant_id:`eq.${r.id}`,order:"created_at.desc",limit:"50",select:"*"}),
            ]);
            setEmployees(emps); setTables(tbls); setOrders(ords); setPayments(pmts); setLogs(lgss);
          } catch(e) {}
          setLoading(false);
        };
        load();
      }, [r.id]);

      const reload = async () => {
        const rows = await db("restaurants","GET",null,{id:`eq.${r.id}`,select:"*"});
        if (rows.length) setR(rows[0]);
      };

      const changePlan = async () => {
        await db("restaurants","PATCH",{plan:newPlan},{id:`eq.${r.id}`});
        await logAction(user,"Changement de plan",r.id,r.nom,`Plan changé en ${newPlan}`);
        toast("Plan mis à jour","success"); setShowPlan(false); reload();
      };

      const prolonger = async () => {
        const days = parseInt(joursAjout)||30;
        const base = r.date_expiration ? new Date(r.date_expiration) : new Date();
        if (base < new Date()) base.setTime(new Date().getTime());
        base.setDate(base.getDate() + days);
        await db("restaurants","PATCH",{date_expiration:base.toISOString(),statut_abo:"actif"},{id:`eq.${r.id}`});
        await logAction(user,"Prolongation accès",r.id,r.nom,`+${days} jours`);
        toast(`Accès prolongé de ${days} jours`, "success"); setShowProlonger(false); reload();
      };

      const suspend = async () => {
        const newStatut = r.statut_abo==="suspendu"?"actif":"suspendu";
        await db("restaurants","PATCH",{statut_abo:newStatut},{id:`eq.${r.id}`});
        await logAction(user,newStatut==="suspendu"?"Suspension":"Réactivation",r.id,r.nom);
        toast(newStatut==="suspendu"?"Restaurant suspendu":"Restaurant réactivé", newStatut==="suspendu"?"error":"success");
        reload();
      };

      const activeEmployees = employees.filter(e=>e.actif);
      const activeTables    = tables.filter(t=>t.statut!=="libre");
      const todayOrders     = orders.filter(o=>new Date(o.created_at).toDateString()===new Date().toDateString());

      return (
        <>
          <div className="page-header">
            <div className="page-header-inner">
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <button className="btn btn-ghost btn-xs" style={{width:"auto"}} onClick={onBack}>← Retour</button>
                <div>
                  <h1 className="page-title" style={{fontSize:18}}>{r.nom}</h1>
                  <p className="page-sub">{r.code} · <StatutChip statut={r.statut_abo||"essai"} /></p>
                </div>
              </div>
            </div>
            <div className="subtabs mt8">
              {["info","employes","tables","commandes","paiements","journal","assistance"].map(t => (
                <button key={t} className={`subtab${tab===t?" active":""}`} onClick={()=>setTab(t)}>
                  {t==="info"?"Infos":t==="employes"?"Employés":t==="tables"?"Tables":t==="commandes"?"Commandes":t==="paiements"?"💰 Paiements":t==="journal"?"Journal":"🔧 Assistance"}
                </button>
              ))}
            </div>
          </div>
          <div style={{padding:"0 16px 16px"}}>
            {tab==="info" && (
              <>
                <div className="card">
                  <div className="card-title">Informations</div>
                  <div className="flex-between mb8"><span style={{color:"var(--t3)"}}>Email</span><span>{r.email}</span></div>
                  <div className="flex-between mb8"><span style={{color:"var(--t3)"}}>Téléphone</span><span>{r.telephone||"—"}</span></div>
                  <div className="flex-between mb8"><span style={{color:"var(--t3)"}}>Adresse</span><span style={{textAlign:"right",maxWidth:"60%"}}>{r.adresse||"—"}</span></div>
                  <div className="flex-between mb8"><span style={{color:"var(--t3)"}}>Plan</span><PlanChip plan={r.plan||"essai"} /></div>
                  <div className="flex-between mb8"><span style={{color:"var(--t3)"}}>Expiration</span><span>{fmtDate(r.date_expiration)}</span></div>
                  <div className="flex-between"><span style={{color:"var(--t3)"}}>Statut</span><StatutChip statut={r.statut_abo||"essai"} /></div>
                </div>
                <div className="stat-row">
                  <div className="stat-card"><div className="stat-val">{activeEmployees.length}</div><div className="stat-label">Employés actifs</div></div>
                  <div className="stat-card"><div className="stat-val stat-accent">{activeTables.length}</div><div className="stat-label">Tables actives</div></div>
                </div>
                <div className="stat-row">
                  <div className="stat-card"><div className="stat-val">{todayOrders.length}</div><div className="stat-label">Commandes du jour</div></div>
                  <div className="stat-card"><div className="stat-val" style={{fontSize:13}}>{fmt(PLANS[r.plan||"essai"]?.prix)}/mois</div><div className="stat-label">Revenu mensuel</div></div>
                </div>
                {perms.editRestaurants && (
                  <div className="card">
                    <div className="card-title">Actions</div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <button className="btn btn-ghost" onClick={()=>setShowPlan(true)}>📦 Changer le plan</button>
                      <button className="btn btn-ghost" onClick={()=>setShowProlonger(true)}>📅 Prolonger l'accès</button>
                      <button className={`btn ${r.statut_abo==="suspendu"?"btn-green":"btn-red"}`} onClick={suspend}>
                        {r.statut_abo==="suspendu"?"✅ Réactiver le restaurant":"🚫 Suspendre le restaurant"}
                      </button>
                    </div>
                  </div>
                )}
              </>
            )}

            {tab==="employes" && (
              loading ? <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}>Chargement...</div> :
              employees.map(e => (
                <div key={e.id} className="list-item">
                  <div className="list-item-main">
                    <div className="list-item-title">{e.prenom} {e.nom}</div>
                    <div className="list-item-sub">{e.role} · {e.login} · {e.actif?"Actif":"Inactif"}</div>
                  </div>
                  {perms.assistance && <AssistanceEmpButton emp={e} restaurant={r} user={user} toast={toast} onRefresh={()=>db("employees","GET",null,{restaurant_id:`eq.${r.id}`,select:"*"}).then(setEmployees)} />}
                </div>
              ))
            )}

            {tab==="tables" && (
              loading ? <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}>Chargement...</div> :
              tables.length===0 ? <div className="empty"><div className="empty-icon">🪑</div><div className="empty-text">Aucune table</div></div> :
              tables.map(t => (
                <div key={t.id} className="list-item">
                  <div className="list-item-main">
                    <div className="list-item-title">{t.is_takeaway?"EM-"+String(t.em_num||0).padStart(3,"0"):"Table "+t.numero}</div>
                    <div className="list-item-sub">Statut: {t.statut}</div>
                  </div>
                  <span className={`chip ${t.statut==="libre"?"chip-gray":t.statut==="occupee"?"chip-gold":"chip-green"}`}>{t.statut}</span>
                </div>
              ))
            )}

            {tab==="commandes" && (
              loading ? <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}>Chargement...</div> :
              orders.length===0 ? <div className="empty"><div className="empty-icon">📋</div><div className="empty-text">Aucune commande</div></div> :
              orders.slice(0,30).map(o => (
                <div key={o.id} className="card" style={{marginBottom:8,padding:"12px 14px"}}>
                  <div className="flex-between">
                    <span style={{fontWeight:600,fontSize:13}}>Commande · {fmtDateTime(o.created_at)}</span>
                    <span className={`chip chip-${o.statut==="pret"?"green":o.statut==="en_preparation"?"gold":o.statut==="rejete"?"red":"gray"}`}>{o.statut}</span>
                  </div>
                  <div style={{fontSize:12,color:"var(--t3)",marginTop:4}}>{o.items?.length||0} article(s)</div>
                </div>
              ))
            )}

            {tab==="paiements" && (
              loading ? <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}>Chargement...</div> :
              <>
                {/* Résumé financier */}
                <div className="card mb12">
                  <div className="card-title">Résumé</div>
                  <div className="flex-between mb8">
                    <span style={{color:"var(--t3)"}}>Total encaissé</span>
                    <span style={{fontFamily:"Outfit",fontWeight:700,color:"var(--gold)"}}>
                      {new Intl.NumberFormat("fr-FR").format(payments.reduce((acc,p)=>acc+(parseFloat(p.montant)||0),0))} GNF
                    </span>
                  </div>
                  <div className="flex-between mb8">
                    <span style={{color:"var(--t3)"}}>Nombre de paiements</span>
                    <span style={{fontWeight:600}}>{payments.length}</span>

                    <span style={{color:"var(--t3)"}}>Aujourd'hui</span>

    // ===================== ASSISTANCE =====================
    function AssistancePage({ restaurant, employees, user, toast, onRefreshEmployees }) {
      const admin = employees.find(e => e.is_super_admin || e.is_admin) || employees[0];
      const [showResetAdmin, setShowResetAdmin] = useState(false);
      const [showEditEmail, setShowEditEmail] = useState(false);
      const [newEmail, setNewEmail] = useState("");
      const [newPassGenerated, setNewPassGenerated] = useState(null);

      const resetAdminPass = async () => {
        if (!admin) { toast("Aucun admin trouvé","error"); return; }
        const p = genPass();
        await db("employees","PATCH",{password_hash:p},{id:`eq.${admin.id}`});
        await logAction(user,"Réinitialisation mot de passe admin",restaurant.id,restaurant.nom,`Admin: ${admin.prenom} ${admin.nom}`);
        setNewPassGenerated({login:admin.login, password:p});
        toast("Mot de passe réinitialisé","success");
      };

      const updateEmail = async () => {
        if (!newEmail||!admin) return;
        await db("employees","PATCH",{login:newEmail},{id:`eq.${admin.id}`});
        await logAction(user,"Modification email admin",restaurant.id,restaurant.nom,`Nouvel email: ${newEmail}`);
        toast("Email mis à jour","success"); setShowEditEmail(false); onRefreshEmployees();
      };

      const copy = (v) => { try { navigator.clipboard.writeText(v); } catch(e){} toast("Copié !","success"); };

      return (
        <>
          {newPassGenerated && (
            <div className="card mb12" style={{borderColor:"rgba(34,197,94,0.3)"}}>
              <div className="card-title" style={{color:"var(--green)"}}>✅ Nouveau mot de passe généré</div>
              <CodeBox label="Identifiant (login)" value={newPassGenerated.login} onCopy={()=>copy(newPassGenerated.login)} />
              <CodeBox label="Nouveau mot de passe" value={newPassGenerated.password} onCopy={()=>copy(newPassGenerated.password)} />
              <p style={{fontSize:12,color:"var(--t3)"}}>Communiquez ces informations au client par WhatsApp</p>
              <button className="btn btn-ghost mt8" onClick={()=>setNewPassGenerated(null)}>Fermer</button>
            </div>
          )}

          <div className="card mb12">
            <div className="card-title">👤 Admin du restaurant</div>
            {admin ? (
              <>
                <div className="flex-between mb8"><span style={{color:"var(--t3)"}}>Nom</span><span>{admin.prenom} {admin.nom}</span></div>
                <div className="flex-between mb8"><span style={{color:"var(--t3)"}}>Login</span><span style={{fontSize:12}}>{admin.login}</span></div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:12}}>
                  <button className="btn btn-ghost" onClick={resetAdminPass}>🔑 Réinitialiser le mot de passe admin</button>
                  <button className="btn btn-ghost" onClick={()=>setShowEditEmail(true)}>✉️ Modifier l'email de connexion</button>
                  <button className="btn btn-ghost" onClick={()=>copy(admin.login)}>👁️ Copier le login admin</button>
                </div>
              </>
            ) : <p style={{color:"var(--t3)"}}>Aucun admin trouvé</p>}
          </div>

          <div className="card">
            <div className="card-title">👥 Tous les employés</div>
            {employees.map(e => (
              <div key={e.id} className="list-item">
                <div className="list-item-main">
                  <div className="list-item-title">{e.prenom} {e.nom}</div>
                  <div className="list-item-sub">{e.role} · {e.actif?"Actif":"Inactif"}</div>
                </div>
                <AssistanceEmpButton emp={e} restaurant={restaurant} user={user} toast={toast} onRefresh={onRefreshEmployees} />
              </div>
            ))}
          </div>

          <Sheet open={showEditEmail} onClose={()=>setShowEditEmail(false)} title="Modifier l'email admin"
            footer={<><button className="btn btn-ghost" onClick={()=>setShowEditEmail(false)}>Annuler</button><button className="btn btn-gold" onClick={updateEmail}>Enregistrer</button></>}>
            <FieldInp label="Nouvel email de connexion" value={newEmail} onChange={setNewEmail} type="email" placeholder="nouveau@email.com" required />
          </Sheet>
        </>
      );
    }

    function AssistanceEmpButton({ emp, restaurant, user, toast, onRefresh }) {
      const [show, setShow] = useState(false);
      const [newPass, setNewPass] = useState(null);

      const resetPass = async () => {
        const p = genPass();
        await db("employees","PATCH",{password_hash:p},{id:`eq.${emp.id}`});
        await logAction(user,"Réinitialisation mot de passe employé",restaurant.id,restaurant.nom,`Employé: ${emp.prenom} ${emp.nom}`);
        setNewPass({login:emp.login,password:p});
        toast("Mot de passe réinitialisé","success"); setShow(false);
      };

      const toggleActif = async () => {
        const newVal = !emp.actif;
        await db("employees","PATCH",{actif:newVal},{id:`eq.${emp.id}`});
        await logAction(user,newVal?"Déblocage employé":"Désactivation employé",restaurant.id,restaurant.nom,`Employé: ${emp.prenom} ${emp.nom}`);
        toast(newVal?"Compte activé":"Compte désactivé",newVal?"success":"info");
        onRefresh();
      };

      return (
        <>
          <button className="btn btn-ghost btn-xs" onClick={()=>setShow(true)}>🔧</button>
          <Sheet open={show} onClose={()=>setShow(false)} title={emp.prenom+" "+emp.nom}>
            <div style={{fontSize:13,color:"var(--t3)",marginBottom:12}}>{emp.role} · {emp.login}</div>
            {newPass && (
              <div className="card mb12" style={{borderColor:"rgba(34,197,94,0.3)"}}>
                <div style={{fontSize:12,color:"var(--green)",fontWeight:700,marginBottom:8}}>✅ Nouveau mot de passe</div>
                <div style={{fontSize:13}}><b>Login :</b> {newPass.login}</div>
                <div style={{fontSize:13}}><b>MDP :</b> {newPass.password}</div>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button className="btn btn-ghost" onClick={resetPass}>🔑 Réinitialiser le mot de passe</button>
              <button className={`btn ${emp.actif?"btn-red":"btn-green"}`} onClick={toggleActif}>{emp.actif?"🔒 Désactiver le compte":"🔓 Débloquer le compte"}</button>
            </div>
          </Sheet>
        </>
      );
    }

    // ===================== FINANCES PAGE =====================
    function FinancesPage({ user, toast }) {
      const [restaurants, setRestaurants] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(()=>{
        db("restaurants","GET",null,{select:"id,nom,plan,statut_abo,date_expiration,code",order:"created_at.desc"})
          .then(setRestaurants).catch(()=>toast("Erreur","error")).finally(()=>setLoading(false));
      },[]);

      const actifs  = restaurants.filter(r=>r.statut_abo==="actif");
      const revenu  = actifs.reduce((acc,r)=>acc+(PLANS[r.plan]?.prix||0),0);
      const parPlan = {};
      actifs.forEach(r=>{ const p=r.plan||"essai"; parPlan[p]=(parPlan[p]||0)+1; });

      return (
        <>
          <div className="page-header"><div className="page-header-inner"><h1 className="page-title">Finances</h1></div></div>
          <div style={{padding:"0 16px 16px"}}>
            {loading ? <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}>Chargement...</div> : (
              <>
                <div className="card">
                  <div className="card-title">Revenus mensuels estimés</div>
                  <div style={{fontFamily:"Outfit",fontSize:32,fontWeight:800,color:"var(--gold)"}}>{fmt(revenu)}</div>
                  <div style={{fontSize:12,color:"var(--t3)",marginTop:4}}>Basé sur {actifs.length} restaurant(s) actif(s)</div>
                </div>
                <div className="card">
                  <div className="card-title">Répartition par plan</div>
                  {Object.entries(PLANS).map(([k,p])=>(
                    <div key={k} className="flex-between" style={{padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                      <div><PlanChip plan={k} /><span style={{fontSize:12,color:"var(--t3)",marginLeft:8}}>{parPlan[k]||0} restaurant(s)</span></div>
                      <span style={{fontWeight:700,fontSize:13}}>{fmt((parPlan[k]||0)*p.prix)}</span>
                    </div>
                  ))}
                </div>
                <div className="card">
                  <div className="card-title">Restaurants actifs</div>
                  {actifs.map(r=>(
                    <div key={r.id} className="list-item">
                      <div className="list-item-main"><div className="list-item-title">{r.nom}</div><div className="list-item-sub">{r.code} · Exp. {fmtDate(r.date_expiration)}</div></div>
                      <div style={{textAlign:"right"}}><PlanChip plan={r.plan} /><div style={{fontSize:12,fontWeight:700,color:"var(--gold)",marginTop:4}}>{fmt(PLANS[r.plan]?.prix||0)}</div></div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        </>
      );
    }

    // ===================== ÉQUIPE PAGE =====================
    function EquipePage({ user, toast }) {
      const [team, setTeam] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showCreate, setShowCreate] = useState(false);
      const [createdCreds, setCreatedCreds] = useState(null);
      const [f, setF] = useState({prenom:"",nom:"",email:"",role:"support"});

      const load = ()=>db("nexaserve_team","GET",null,{select:"*",order:"created_at.desc"}).then(setTeam).finally(()=>setLoading(false));
      useEffect(()=>load(),[]);

      const createMember = async () => {
        if (!f.prenom||!f.nom||!f.email) { toast("Champs obligatoires","error"); return; }
        const pass = genPass();
        await db("nexaserve_team","POST",{prenom:f.prenom,nom:f.nom,email:f.email,password_hash:pass,role:f.role,actif:true});
        await logAction(user,"Création compte équipe",null,null,`${f.prenom} ${f.nom} (${f.role})`);
        setCreatedCreds({email:f.email,password:pass,nom:f.prenom+" "+f.nom});
        setF({prenom:"",nom:"",email:"",role:"support"});
        setShowCreate(false); toast("Membre créé","success"); load();
      };

      const toggleActif = async (m) => {
        await db("nexaserve_team","PATCH",{actif:!m.actif},{id:`eq.${m.id}`});
        await logAction(user,!m.actif?"Activation membre":"Désactivation membre",null,null,`${m.prenom} ${m.nom}`);
        toast(!m.actif?"Activé":"Désactivé","success"); load();
      };

      const deleteMember = async (m) => {
        await db("nexaserve_team","DELETE",null,{id:`eq.${m.id}`});
        await logAction(user,"Suppression compte équipe",null,null,`${m.prenom} ${m.nom}`);
        toast("Membre supprimé","success"); load();
      };

      const resetPass = async (m) => {
        const p = genPass();
        await db("nexaserve_team","PATCH",{password_hash:p},{id:`eq.${m.id}`});
        setCreatedCreds({email:m.email,password:p,nom:m.prenom+" "+m.nom});
        toast("Mot de passe réinitialisé","success");
      };

      const copy = (v)=>{ try{navigator.clipboard.writeText(v);}catch(e){} toast("Copié !","success"); };

      return (
        <>
          <div className="page-header">
            <div className="page-header-inner">
              <h1 className="page-title">Équipe</h1>
              <button className="btn btn-gold btn-xs" style={{width:"auto"}} onClick={()=>setShowCreate(true)}>+ Ajouter</button>
            </div>
          </div>
          <div style={{padding:"0 16px 16px"}}>
            {createdCreds && (
              <div className="card mb12" style={{borderColor:"rgba(34,197,94,0.3)"}}>
                <div className="card-title" style={{color:"var(--green)"}}>✅ Identifiants de {createdCreds.nom}</div>
                <CodeBox label="Email" value={createdCreds.email} onCopy={()=>copy(createdCreds.email)} />
                <CodeBox label="Mot de passe" value={createdCreds.password} onCopy={()=>copy(createdCreds.password)} />
                <p style={{fontSize:12,color:"var(--t3)"}}>Communiquer par WhatsApp — visible une seule fois</p>
                <button className="btn btn-ghost mt8" onClick={()=>setCreatedCreds(null)}>Fermer</button>
              </div>
            )}
            {loading ? <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}>Chargement...</div> :
              team.map(m=>(
                <div key={m.id} className="card mb8">
                  <div className="flex-between mb8">
                    <div>
                      <div style={{fontWeight:700}}>{m.prenom} {m.nom}</div>
                      <div style={{fontSize:12,color:"var(--t3)"}}>{m.email}</div>
                    </div>
                    <div style={{display:"flex",gap:6,flexDirection:"column",alignItems:"flex-end"}}>
                      <span className={`chip ${ROLES_TEAM[m.role]?.emoji?"chip-gold":"chip-gray"}`}>{ROLES_TEAM[m.role]?.emoji} {ROLES_TEAM[m.role]?.label||m.role}</span>
                      <span className={`chip ${m.actif?"chip-green":"chip-red"}`}>{m.actif?"Actif":"Inactif"}</span>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:"var(--t3)",marginBottom:8}}>Dernier login : {fmtDateTime(m.last_login)}</div>
                  {m.email !== "nexaserve18@gmail.com" && (
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <button className="btn btn-ghost btn-xs" onClick={()=>toggleActif(m)}>{m.actif?"Désactiver":"Activer"}</button>
                      <button className="btn btn-ghost btn-xs" onClick={()=>resetPass(m)}>🔑 Nouveau MDP</button>
                      <button className="btn btn-red btn-xs" onClick={()=>deleteMember(m)}>🗑️</button>
                    </div>
                  )}
                </div>
              ))
            }
          </div>

          <Sheet open={showCreate} onClose={()=>setShowCreate(false)} title="Nouveau membre"
            footer={<><button className="btn btn-ghost" onClick={()=>setShowCreate(false)}>Annuler</button><button className="btn btn-gold" onClick={createMember}>Créer</button></>}>
            <FieldInp label="Prénom" value={f.prenom} onChange={v=>setF(x=>({...x,prenom:v}))} required />
            <FieldInp label="Nom" value={f.nom} onChange={v=>setF(x=>({...x,nom:v}))} required />
            <FieldInp label="Email" value={f.email} onChange={v=>setF(x=>({...x,email:v}))} type="email" required />
            <div className="field"><label>Rôle *</label>
              <select className="inp" value={f.role} onChange={e=>setF(x=>({...x,role:e.target.value}))}>
                <option value="support">Support Client</option>
                <option value="comptable">Comptable</option>
                <option value="manager">Manager</option>
              </select>
            </div>
            <div className="alert alert-info">Le mot de passe sera généré automatiquement et affiché une seule fois.</div>
          </Sheet>
        </>
      );
    }

    // ===================== JOURNAL PAGE =====================
    function JournalPage({ user, toast }) {
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filterMember, setFilterMember] = useState("all");
      const [filterAction, setFilterAction] = useState("all");
      const [members, setMembers] = useState([]);

      useEffect(()=>{
        Promise.all([
          db("admin_logs","GET",null,{select:"*",order:"created_at.desc",limit:"100"}),
          db("nexaserve_team","GET",null,{select:"id,prenom,nom"}),
        ]).then(([l,m])=>{setLogs(l);setMembers(m);}).catch(()=>toast("Erreur","error")).finally(()=>setLoading(false));
      },[]);

      const filtered = logs.filter(l=>{
        if (filterMember!=="all" && l.team_member_id!==filterMember) return false;
        if (filterAction!=="all" && !l.action?.includes(filterAction)) return false;
        return true;
      });

      const actionTypes = [...new Set(logs.map(l=>l.action?.split(" ")[0]).filter(Boolean))];

      return (
        <>
          <div className="page-header">
            <div className="page-header-inner"><h1 className="page-title">Journal</h1></div>
            <div className="subtabs mt8">
              <button className={`subtab${filterMember==="all"?" active":""}`} onClick={()=>setFilterMember("all")}>Tous</button>
              {members.map(m=><button key={m.id} className={`subtab${filterMember===m.id?" active":""}`} onClick={()=>setFilterMember(m.id)}>{m.prenom}</button>)}
            </div>
          </div>
          <div style={{padding:"0 16px 16px"}}>
            {loading ? <div style={{textAlign:"center",padding:40,color:"var(--t3)"}}>Chargement...</div> :
              filtered.length===0 ? <div className="empty"><div className="empty-icon">📋</div><div className="empty-text">Aucune action</div></div> :
              filtered.map(l=>(
                <div key={l.id} className="list-item">
                  <div className="list-item-main">
                    <div className="list-item-title">{l.action}</div>
                    <div className="list-item-sub">{l.team_member_name} · {fmtDateTime(l.created_at)}</div>
                    {l.restaurant_nom && <div style={{fontSize:11,color:"var(--t3)"}}>{l.restaurant_nom}</div>}
                    {l.details && <div style={{fontSize:11,color:"var(--t3)"}}>{l.details}</div>}
                  </div>
                </div>
              ))
            }
          </div>
        </>
      );
    }

    // ===================== PARAMÈTRES PAGE =====================
    function ParametresPage({ user, setUser, toast, logout }) {
      const [email,    setEmail]   = useState(user.email);
      const [oldPass,  setOldPass] = useState("");
      const [newPass,  setNewPass] = useState("");
      const [newPass2, setNewPass2]= useState("");
      const [confirmLogout, setConfirmLogout] = useState(false);

      const saveEmail = async () => {
        if (!email) return;
        await db("nexaserve_team","PATCH",{email},{id:`eq.${user.id}`});
        setUser({...user,email}); toast("Email mis à jour","success");
      };

      const savePass = async () => {
        if (user.password_hash !== oldPass) { toast("Ancien mot de passe incorrect","error"); return; }
        if (newPass.length < 6) { toast("Mot de passe trop court (min 6)","error"); return; }
        if (newPass !== newPass2) { toast("Les mots de passe ne correspondent pas","error"); return; }
        await db("nexaserve_team","PATCH",{password_hash:newPass},{id:`eq.${user.id}`});
        setUser({...user,password_hash:newPass}); toast("Mot de passe changé","success");
        setOldPass(""); setNewPass(""); setNewPass2("");
      };

      return (
        <>
          <div className="page-header"><div className="page-header-inner"><h1 className="page-title">Paramètres</h1></div></div>
          <div style={{padding:"0 16px 16px"}}>
            <div className="card mb12">
              <div className="card-title">Mon compte</div>
              <div style={{fontSize:13,color:"var(--t3)",marginBottom:12}}>{ROLES_TEAM[user.role]?.emoji} {user.prenom} {user.nom} · {ROLES_TEAM[user.role]?.label}</div>
              <FieldInp label="Email de connexion" value={email} onChange={setEmail} type="email" />
              <button className="btn btn-gold" onClick={saveEmail}>Sauvegarder l'email</button>
            </div>
            <div className="card mb12">
              <div className="card-title">🔑 Changer le mot de passe</div>
              <FieldInp label="Ancien mot de passe" value={oldPass} onChange={setOldPass} type="password" placeholder="••••••••" />
              <FieldInp label="Nouveau mot de passe" value={newPass} onChange={setNewPass} type="password" placeholder="Min 6 caractères" />
              <FieldInp label="Confirmer" value={newPass2} onChange={setNewPass2} type="password" placeholder="Idem ci-dessus" />
              <button className="btn btn-gold" onClick={savePass}>Enregistrer</button>
            </div>
            <button className="btn btn-red" onClick={()=>setConfirmLogout(true)}>🚪 Se déconnecter</button>
            <Confirm open={confirmLogout} onClose={()=>setConfirmLogout(false)} title="Déconnexion" msg="Voulez-vous vous déconnecter ?" onOk={logout} danger />
          </div>
        </>
      );
    }

    // ===================== ROOT =====================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
